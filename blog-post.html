<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Blog - İzmir Websitesi</title>
    <meta name="description" id="pageDesc" content="Web tasarım, SEO ve dijital pazarlama hakkında bilgiler.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" id="pageCanonical" href="https://www.izmirwebsitesi.net/blog">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.svg">
    <meta property="og:type" content="article">
    <meta property="og:url" id="ogUrl" content="https://www.izmirwebsitesi.net/blog">
    <meta property="og:title" id="ogTitle" content="Blog - İzmir Websitesi">
    <meta property="og:description" id="ogDesc" content="">
    <meta property="og:image" id="ogImage" content="https://www.izmirwebsitesi.net/assets/og-image.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --accent: #e8734a; --bg: #f6f1ec; --dark: #1a1714; --text: #2d2a26; --muted: #8a8580; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        a { text-decoration: none; color: inherit; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
        .container-narrow { max-width: 740px; margin: 0 auto; padding: 0 24px; }

        /* NAVBAR */
        .navbar { position: sticky; top: 0; z-index: 100; padding: 16px 0; transition: all .3s; }
        .navbar.scrolled { background: rgba(246,241,236,0.9); backdrop-filter: blur(20px); box-shadow: 0 2px 20px rgba(0,0,0,.06); }
        .navbar-inner { display: flex; align-items: center; justify-content: space-between; }
        .navbar-brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.1rem; }
        .brand-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: .95rem; }
        .nav-back { display: flex; align-items: center; gap: 6px; font-size: .85rem; font-weight: 600; color: var(--accent); transition: gap .2s; }
        .nav-back:hover { gap: 10px; }
        .navbar-cta { background: var(--accent); color: #fff; padding: 10px 20px; border-radius: 50px; font-weight: 700; font-size: .85rem; transition: all .2s; }
        .navbar-cta:hover { background: #d4622f; }

        /* ARTICLE HEADER */
        .article-header { padding: 64px 0 40px; }
        .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: .8rem; color: var(--muted); margin-bottom: 24px; }
        .breadcrumb a { color: var(--accent); font-weight: 600; }
        .breadcrumb a:hover { text-decoration: underline; }
        .article-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .article-cat { font-size: .78rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .07em; background: rgba(232,115,74,.1); padding: 4px 12px; border-radius: 50px; }
        .article-date { font-size: .82rem; color: var(--muted); }
        .article-header h1 { font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 800; line-height: 1.2; margin-bottom: 20px; }
        .article-summary { font-size: 1.1rem; color: var(--muted); line-height: 1.7; }

        /* COVER IMAGE */
        .cover-img-wrap { margin: 40px 0; border-radius: 24px; overflow: hidden; aspect-ratio: 16/7; }
        .cover-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* ARTICLE BODY */
        .article-body { padding-bottom: 80px; }
        .article-content { font-size: 1.02rem; line-height: 1.85; color: #111; }
        .article-content h1,
        .article-content h2,
        .article-content h3,
        .article-content h4 { color: #111 !important; font-family: 'Plus Jakarta Sans', sans-serif; }
        .article-content h1 { font-size: 1.9rem; font-weight: 800; margin: 48px 0 18px; }
        .article-content h2 { font-size: 1.5rem; font-weight: 800; margin: 40px 0 14px; }
        .article-content h3 { font-size: 1.2rem; font-weight: 700; margin: 28px 0 10px; }
        /* Quill boş paragrafları gizle */
        .article-content p { margin-bottom: 14px; }
        .article-content p > br:only-child { display: none; }
        .article-content p:has(> br:only-child) { margin: 0; line-height: 0; }
        .article-content ul, .article-content ol { margin: 0 0 16px 24px; }
        .article-content li { margin-bottom: 8px; }
        .article-content a { color: var(--accent); text-decoration: underline; }
        .article-content strong { font-weight: 700; color: #111; }
        .article-content blockquote { border-left: 4px solid var(--accent); padding: 16px 20px; background: rgba(232,115,74,.06); border-radius: 0 12px 12px 0; margin: 24px 0; font-style: italic; color: var(--muted); }
        .article-content img { max-width: 100%; border-radius: 12px; margin: 16px 0; }
        .article-content code { background: #e8e3de; padding: 2px 7px; border-radius: 5px; font-size: .9em; font-family: monospace; }

        /* CTA BANNER */
        .cta-banner { background: var(--dark); border-radius: 24px; padding: 48px 40px; text-align: center; margin: 0 0 80px; }
        .cta-banner h2 { font-size: 1.6rem; font-weight: 800; color: #fff; margin-bottom: 12px; }
        .cta-banner p { color: #8a8580; margin-bottom: 28px; }
        .cta-banner a { display: inline-block; background: var(--accent); color: #fff; padding: 14px 32px; border-radius: 50px; font-weight: 700; font-size: .95rem; transition: background .2s; }
        .cta-banner a:hover { background: #d4622f; }

        /* LOADING / ERROR */
        .state-msg { text-align: center; padding: 100px 20px; color: var(--muted); }
        .state-msg i { font-size: 2.5rem; margin-bottom: 16px; display: block; }

        /* FOOTER */
        .footer { background: var(--dark); color: #b5afa9; padding: 40px 0 28px; }
        .footer-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; padding-bottom: 28px; border-bottom: 1px solid rgba(255,255,255,.08); margin-bottom: 20px; }
        .footer-brand { font-size: 1.1rem; font-weight: 900; color: #fff; }
        .footer-brand span { display: block; font-size: .8rem; font-weight: 400; color: #8a8580; margin-top: 4px; }
        .footer-nav { display: flex; gap: 20px; flex-wrap: wrap; }
        .footer-nav a { font-size: .84rem; transition: color .2s; }
        .footer-nav a:hover { color: var(--accent); }
        .footer-bottom { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; font-size: .8rem; }
        @media (max-width: 600px) { .footer-top { flex-direction: column; text-align: center; } .footer-nav { justify-content: center; } .footer-bottom { flex-direction: column; text-align: center; } .cta-banner { padding: 36px 24px; } }
    </style>
</head>
<body>

<nav class="navbar" id="navbar">
    <div class="container">
        <div class="navbar-inner">
            <a href="/" class="navbar-brand">
                <div class="brand-icon"><i class="fa-solid fa-globe"></i></div>
                İzmir Websitesi
            </a>
            <a href="/blog" class="nav-back"><i class="fa-solid fa-arrow-left"></i> Blog</a>
            <a href="tel:+905333889923" class="navbar-cta"><i class="fa-solid fa-phone"></i> 0533 388 9923</a>
        </div>
    </div>
</nav>

<div id="articleWrap"></div>

<footer class="footer">
    <div class="container">
        <div class="footer-top">
            <div class="footer-brand">
                İzmir Websitesi
                <span>Dijital Dünyada İşiniz Parlasın</span>
            </div>
            <div class="footer-nav">
                <a href="/#hakkimizda">Hakkımızda</a>
                <a href="/#hizmetler">Hizmetler</a>
                <a href="/#fiyatlar">Fiyatlar</a>
                <a href="/#portfoy">Portföy</a>
                <a href="/blog">Blog</a>
                <a href="/#iletisim">İletişim</a>
            </div>
        </div>
        <div class="footer-bottom">
            <span>&copy; 2026 İzmir Websitesi. Tüm hakları saklıdır.</span>
            <span>+90 533 388 9923 | info@argevitas.com</span>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
    const { createClient } = window.supabase;
    const db = createClient(
        'https://qprycrbcomnfuevfgxbm.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwcnljcmJjb21uZnVldmZneGJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Njk4MjQsImV4cCI6MjA5MDM0NTgyNH0.o4u7CSDKj42O3ucg36rYIeEF104rc-8c5W3rjH3JqPA'
    );

    window.addEventListener('scroll', () => {
        document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 30);
    });

    function formatDate(str) {
        if (!str) return '';
        return new Date(str).toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    // Quill'in eklediği inline renk stillerini temizle
    function sanitizeContent(html) {
        const div = document.createElement('div');
        div.innerHTML = html;
        div.querySelectorAll('[style]').forEach(el => {
            el.style.removeProperty('color');
            el.style.removeProperty('background-color');
            if (!el.getAttribute('style').trim()) el.removeAttribute('style');
        });
        return div.innerHTML;
    }

    async function loadPost() {
        const slug = new URLSearchParams(window.location.search).get('slug');
        if (!slug) {
            showError('Yazı bulunamadı.', 'Geçerli bir blog yazısı adresi değil.');
            return;
        }

        const { data, error } = await db.from('posts').select('*').eq('slug', slug).eq('published', true).single();

        if (error || !data) {
            showError('Yazı bulunamadı.', 'Bu yazı yayından kaldırılmış ya da hiç yayınlanmamış olabilir.');
            return;
        }

        // Update meta tags — prefer dedicated SEO fields, fall back to title/summary
        const metaTitle = data.seo_title || data.title;
        const metaDesc  = data.seo_description || data.summary || '';
        document.getElementById('pageTitle').textContent = metaTitle + ' - İzmir Websitesi';
        document.getElementById('pageDesc').setAttribute('content', metaDesc);
        document.getElementById('pageCanonical').setAttribute('href', 'https://www.izmirwebsitesi.net/blog/' + slug);
        document.getElementById('ogUrl').setAttribute('content', 'https://www.izmirwebsitesi.net/blog/' + slug);
        document.getElementById('ogTitle').setAttribute('content', metaTitle);
        document.getElementById('ogDesc').setAttribute('content', metaDesc);
        if (data.cover_image) document.getElementById('ogImage').setAttribute('content', data.cover_image);

        // Schema.org Article
        const schema = {
            "@context": "https://schema.org",
            "@type": "Article",
            "headline": data.title,
            "description": data.summary || '',
            "image": data.cover_image || '',
            "datePublished": data.created_at,
            "dateModified": data.updated_at || data.created_at,
            "author": { "@type": "Organization", "name": "İzmir Websitesi" },
            "publisher": { "@type": "Organization", "name": "İzmir Websitesi", "url": "https://www.izmirwebsitesi.net" }
        };
        const schemaEl = document.createElement('script');
        schemaEl.type = 'application/ld+json';
        schemaEl.textContent = JSON.stringify(schema);
        document.head.appendChild(schemaEl);

        document.getElementById('articleWrap').innerHTML = `
            <div class="article-header">
                <div class="container-narrow">
                    <div class="breadcrumb">
                        <a href="/blog">Blog</a>
                        <i class="fa-solid fa-chevron-right" style="font-size:.65rem"></i>
                        <span>${data.category || 'Yazı'}</span>
                    </div>
                    <div class="article-meta">
                        ${data.category ? `<span class="article-cat">${data.category}</span>` : ''}
                        <span class="article-date">${formatDate(data.created_at)}</span>
                    </div>
                    <h1>${data.title}</h1>
                    ${data.summary ? `<p class="article-summary">${data.summary}</p>` : ''}
                </div>
                ${data.cover_image ? `
                <div class="container">
                    <div class="cover-img-wrap">
                        <img src="${data.cover_image}" alt="${data.title}">
                    </div>
                </div>` : ''}
            </div>
            <div class="article-body">
                <div class="container-narrow">
                    <div class="article-content">${sanitizeContent(data.content || '')}</div>
                </div>
                <div class="container">
                    <div class="cta-banner">
                        <h2>Web siteniz için profesyonel destek alın</h2>
                        <p>İzmir'deki işletmeniz için modern, hızlı ve dönüşüm odaklı bir web sitesi oluşturalım.</p>
                        <a href="/#iletisim">Ücretsiz Danışmanlık Al</a>
                    </div>
                </div>
            </div>`;
    }

    function showError(title, desc) {
        document.getElementById('articleWrap').innerHTML = `
            <div class="state-msg">
                <i class="fa-regular fa-face-sad-tear"></i>
                <strong style="display:block;font-size:1.2rem;margin-bottom:8px">${title}</strong>
                <p>${desc}</p>
                <a href="/blog" style="display:inline-block;margin-top:24px;color:var(--accent);font-weight:700">
                    <i class="fa-solid fa-arrow-left"></i> Blog'a Dön
                </a>
            </div>`;
    }

    loadPost();
</script>
</body>
</html>
