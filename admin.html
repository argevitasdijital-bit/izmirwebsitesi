<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İzmir Websitesi - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f6f1ec;
            color: #2d2a26;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        /* Login Screen */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f6f1ec 0%, #faf7f4 100%);
        }

        .login-box {
            background: #fff;
            border-radius: 28px;
            padding: 48px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.06);
        }

        .login-box h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: #2d2a26;
        }

        .login-box p {
            color: #8a8580;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        .fg {
            margin-bottom: 20px;
        }

        .fg label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: #2d2a26;
            margin-bottom: 6px;
        }

        .fg input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e8e3de;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.25s;
        }

        .fg input:focus {
            outline: none;
            border-color: #e8734a;
            box-shadow: 0 0 0 4px rgba(232,115,74,0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #e8734a;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.25s;
        }

        .btn-login:hover {
            background: #d45a32;
            transform: translateY(-1px);
        }

        .login-error {
            color: #dc2626;
            font-size: 0.85rem;
            margin-top: 16px;
            text-align: center;
            display: none;
        }

        /* Dashboard */
        .dashboard {
            display: none;
            min-height: 100vh;
            padding: 24px 0;
        }

        .dashboard.show { display: block; }

        .header {
            background: #fff;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0,0,0,0.06);
        }

        .header h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #2d2a26;
        }

        .logout-btn {
            background: #dc2626;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.25s;
        }

        .logout-btn:hover {
            background: #b91c1c;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: #fff;
            padding: 12px;
            border-radius: 20px;
            overflow-x: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.06);
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            white-space: nowrap;
            transition: all 0.25s;
            color: #8a8580;
            font-family: inherit;
        }

        .tab-btn.active {
            background: #e8734a;
            color: #fff;
        }

        .tab-btn:hover:not(.active) {
            background: #faf7f4;
        }

        .tab-content {
            display: none;
            background: #fff;
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.06);
        }

        .tab-content.active { display: block; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .btn-save {
            background: #e8734a;
            color: #fff;
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.25s;
            font-family: inherit;
        }

        .btn-save:hover {
            background: #d45a32;
            transform: translateY(-1px);
        }

        .btn-save:disabled {
            background: #d1d5db;
            cursor: not-allowed;
            transform: none;
        }

        .list-item {
            background: #faf7f4;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-item-content {
            flex: 1;
        }

        .list-item h4 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .list-item-actions {
            display: flex;
            gap: 8px;
        }

        .btn-edit, .btn-delete {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.25s;
            font-family: inherit;
        }

        .btn-edit {
            background: #dbeafe;
            color: #1e40af;
        }

        .btn-edit:hover {
            background: #bfdbfe;
        }

        .btn-delete {
            background: #fee2e2;
            color: #dc2626;
        }

        .btn-delete:hover {
            background: #fecaca;
        }

        .btn-add {
            background: #e8734a;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 20px;
            font-family: inherit;
        }

        .btn-add:hover {
            background: #d45a32;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show { display: flex; }

        .modal-content {
            background: #fff;
            border-radius: 20px;
            padding: 32px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #8a8580;
        }

        .status-msg {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .status-msg.success {
            background: #dcfce7;
            color: #166534;
        }

        .status-msg.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-msg.show { display: block; }

        textarea {
            font-family: inherit;
        }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 16px; }
            .modal-content { width: 95%; }
            .tabs { gap: 4px; }
            .tab-btn { padding: 8px 12px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>Admin Panel</h1>
            <p>İzmir Websitesi içerik yönetimi</p>
            <form id="loginForm">
                <div class="fg">
                    <label for="password">Şifre</label>
                    <input type="password" id="password" placeholder="Şifreyi girin" required>
                </div>
                <button type="submit" class="btn-login">Giriş Yap</button>
                <div class="login-error" id="loginError">Şifre yanlış!</div>
            </form>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard" id="dashboard">
        <div class="container">
            <div class="header">
                <h2>Admin Panel - İçerik Yönetimi</h2>
                <button class="logout-btn" id="logoutBtn">Çıkış Yap</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="seo">SEO</button>
                <button class="tab-btn" data-tab="campaign">Kampanya</button>
                <button class="tab-btn" data-tab="packages">Paketler</button>
                <button class="tab-btn" data-tab="services">Hizmetler</button>
                <button class="tab-btn" data-tab="portfolio">Portföy</button>
                <button class="tab-btn" data-tab="testimonials">Yorumlar</button>
                <button class="tab-btn" data-tab="extras">Ek Hizmetler</button>
            </div>

            <div class="status-msg" id="statusMsg"></div>

            <!-- SEO TAB -->
            <div class="tab-content active" id="seoTab">
                <h3>Site SEO Ayarları</h3>
                <form id="seoForm" style="margin-top: 20px;">
                    <div class="form-row full">
                        <label>Meta Title</label>
                        <input type="text" id="seoTitle" maxlength="255" style="width: 100%; padding: 10px; border: 1.5px solid #e8e3de; border-radius: 8px; font-family: inherit;">
                    </div>
                    <div class="form-row full">
                        <label>Meta Description</label>
                        <textarea id="seoDesc" style="width: 100%; padding: 10px; border: 1.5px solid #e8e3de; border-radius: 8px; font-family: inherit; min-height: 80px;"></textarea>
                    </div>
                    <div class="form-row full">
                        <label>Meta Keywords</label>
                        <input type="text" id="seoKeywords" style="width: 100%; padding: 10px; border: 1.5px solid #e8e3de; border-radius: 8px; font-family: inherit;">
                    </div>
                    <button type="submit" class="btn-save">Kaydet</button>
                </form>
            </div>

            <!-- CAMPAIGN TAB -->
            <div class="tab-content" id="campaignTab">
                <h3>Kampanya Yönetimi</h3>
                <form id="campaignForm" style="margin-top: 20px;">
                    <div class="form-row">
                        <div class="fg">
                            <label>Başlık</label>
                            <input type="text" id="campaignTitle" style="width: 100%; padding: 10px; border: 1.5px solid #e8e3de; border-radius: 8px; font-family: inherit;">
                        </div>
                        <div class="fg">
                            <label>Eski Fiyat (₺)</label>
                            <input type="number" id="campaignOldPrice" style="width: 100%; padding: 10px; border: 1.5px solid #e8e3de; border-radius: 8px; font-family: inherit;">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="fg">
                            <label>Yeni Fiyat (₺)</label>
                            <input type="number" id="campaignNewPrice" style="width: 100%; padding: 10px; border: 1.5px solid #e8e3de; border-radius: 8px; font-family: inherit;">
                        </div>
                        <div class="fg">
                            <label>İndirim Yüzdesi (%)</label>
                            <input type="number" id="campaignDiscount" style="width: 100%; padding: 10px; border: 1.5px solid #e8e3de; border-radius: 8px; font-family: inherit;">
                        </div>
                    </div>
                    <div class="form-row full">
                        <label>Özellikleri (Her satırda bir özellik)</label>
                        <textarea id="campaignFeatures" style="width: 100%; padding: 10px; border: 1.5px solid #e8e3de; border-radius: 8px; font-family: inherit; min-height: 100px;"></textarea>
                    </div>
                    <div class="form-row full">
                        <label>Not</label>
                        <textarea id="campaignNotes" style="width: 100%; padding: 10px; border: 1.5px solid #e8e3de; border-radius: 8px; font-family: inherit; min-height: 60px;"></textarea>
                    </div>
                    <button type="submit" class="btn-save">Kaydet</button>
                </form>
            </div>

            <!-- PACKAGES TAB -->
            <div class="tab-content" id="packagesTab">
                <h3>Paket Yönetimi</h3>
                <button class="btn-add" onclick="openPackageModal()">+ Yeni Paket</button>
                <div id="packagesList"></div>
            </div>

            <!-- SERVICES TAB -->
            <div class="tab-content" id="servicesTab">
                <h3>Hizmetler Yönetimi</h3>
                <button class="btn-add" onclick="openServiceModal()">+ Yeni Hizmet</button>
                <div id="servicesList"></div>
            </div>

            <!-- PORTFOLIO TAB -->
            <div class="tab-content" id="portfolioTab">
                <h3>Portföy Yönetimi</h3>
                <button class="btn-add" onclick="openPortfolioModal()">+ Yeni Proje</button>
                <div id="portfolioList"></div>
            </div>

            <!-- TESTIMONIALS TAB -->
            <div class="tab-content" id="testimonialsTab">
                <h3>Müşteri Yorumları</h3>
                <button class="btn-add" onclick="openTestimonialModal()">+ Yeni Yorum</button>
                <div id="testimonialsList"></div>
            </div>

            <!-- EXTRAS TAB -->
            <div class="tab-content" id="extrasTab">
                <h3>Ek Hizmetler Yönetimi</h3>
                <button class="btn-add" onclick="openExtraModal()">+ Yeni Hizmet</button>
                <div id="extrasList"></div>
            </div>
        </div>
    </div>

    <!-- MODALS -->
    <div class="modal" id="packageModal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Paket Düzenle</span>
                <button class="modal-close" onclick="closeModal('packageModal')">&times;</button>
            </div>
            <form id="packageFormModal">
                <div class="fg">
                    <label>Paket Adı</label>
                    <input type="text" id="pkgName" style="width: 100%; padding: 10px; border: 1.5px solid #e8e3de; border-radius: 8px; font-family: inherit;">
                </div>
                <div class="fg">
                    <label>Fiyat (₺) - Enterprise için boş bırakın</label>
                    <input type="number" id="pkgPrice" style="width: 100%; padding: 10px; border: 1.5px solid #e8e3de; border-radius: 8px; font-family: inherit;">
                </div>
                <div class="fg">
                    <label>Özellikleri (Her satırda bir özellik)</label>
                    <textarea id="pkgFeatures" style="width: 100%; padding: 10px; border: 1.5px solid #e8e3de; border-radius: 8px; font-family: inherit; min-height: 100px;"></textarea>
                </div>
                <div class="fg">
                    <label>Popüler Paket mi?</label>
                    <input type="checkbox" id="pkgPopular">
                </div>
                <button type="submit" class="btn-save" onclick="savePackage(event)">Kaydet</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        const SUPABASE_URL = 'https://qprycrbcomnfuevfgxbm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwcnljcmJjb21uZnVldmZneGJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Njk4MjQsImV4cCI6MjA5MDM0NTgyNH0.o4u7CSDKj42O3ucg36rYIeEF104rc-8c5W3rjH3JqPA';
        const ADMIN_PASSWORD = 'W%8=n@4é?&#j';

        const { createClient } = window.supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_KEY);

        // AUTH
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const pwd = document.getElementById('password').value;
            if (pwd === ADMIN_PASSWORD) {
                localStorage.setItem('adminLoggedIn', 'true');
                showDashboard();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('adminLoggedIn');
            location.reload();
        });

        // INIT
        if (localStorage.getItem('adminLoggedIn')) {
            showDashboard();
        }

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').classList.add('show');
            loadAllData();
        }

        // TABS
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab + 'Tab').classList.add('active');
            });
        });

        // LOAD ALL DATA
        async function loadAllData() {
            await loadSEO();
            await loadCampaign();
            await loadPackages();
            await loadServices();
            await loadPortfolio();
            await loadTestimonials();
            await loadExtras();
        }

        async function loadSEO() {
            const { data } = await db.from('site_config').select('*').single();
            if (data) {
                document.getElementById('seoTitle').value = data.meta_title || '';
                document.getElementById('seoDesc').value = data.meta_description || '';
                document.getElementById('seoKeywords').value = data.meta_keywords || '';
            }
        }

        document.getElementById('seoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await db.from('site_config').update({
                meta_title: document.getElementById('seoTitle').value,
                meta_description: document.getElementById('seoDesc').value,
                meta_keywords: document.getElementById('seoKeywords').value,
                updated_at: new Date()
            }).eq('id', 1);
            showStatus(error ? 'error: ' + error.message : 'SEO ayarları kaydedildi!', !error);
        });

        async function loadCampaign() {
            const { data } = await db.from('campaign').select('*').eq('active', true).single();
            if (data) {
                document.getElementById('campaignTitle').value = data.title || '';
                document.getElementById('campaignOldPrice').value = data.price_old || '';
                document.getElementById('campaignNewPrice').value = data.price_new || '';
                document.getElementById('campaignDiscount').value = data.discount_percent || '';
                document.getElementById('campaignFeatures').value = (data.features ? JSON.parse(data.features).join('\n') : '');
                document.getElementById('campaignNotes').value = data.notes || '';
            }
        }

        document.getElementById('campaignForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const features = document.getElementById('campaignFeatures').value.split('\n').filter(f => f.trim());
            const { error } = await db.from('campaign').update({
                title: document.getElementById('campaignTitle').value,
                price_old: parseInt(document.getElementById('campaignOldPrice').value),
                price_new: parseInt(document.getElementById('campaignNewPrice').value),
                discount_percent: parseInt(document.getElementById('campaignDiscount').value),
                features: JSON.stringify(features),
                notes: document.getElementById('campaignNotes').value,
                updated_at: new Date()
            }).eq('active', true);
            showStatus(error ? 'error: ' + error.message : 'Kampanya kaydedildi!', !error);
        });

        async function loadPackages() {
            const { data } = await db.from('packages').select('*').order('order_index');
            const html = data.map(pkg => `
                <div class="list-item">
                    <div class="list-item-content">
                        <h4>${pkg.name}</h4>
                        <p>${pkg.price ? '₺' + pkg.price : 'Özel Fiyat'}</p>
                    </div>
                    <div class="list-item-actions">
                        <button class="btn-edit" onclick="editPackage(${pkg.id})">Düzenle</button>
                        <button class="btn-delete" onclick="deletePackage(${pkg.id})">Sil</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('packagesList').innerHTML = html;
        }

        async function loadServices() {
            const { data } = await db.from('services').select('*').order('order_index');
            const html = data.map(svc => `
                <div class="list-item">
                    <div class="list-item-content">
                        <h4>${svc.name}</h4>
                        <p>${svc.description}</p>
                    </div>
                    <div class="list-item-actions">
                        <button class="btn-edit" onclick="editService(${svc.id})">Düzenle</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('servicesList').innerHTML = html;
        }

        async function loadPortfolio() {
            const { data } = await db.from('portfolio').select('*').order('order_index');
            const html = data.map(port => `
                <div class="list-item">
                    <div class="list-item-content">
                        <h4>${port.name}</h4>
                        <p>${port.category} - <a href="${port.url}" target="_blank">${port.url}</a></p>
                    </div>
                    <div class="list-item-actions">
                        <button class="btn-edit" onclick="editPortfolio(${port.id})">Düzenle</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('portfolioList').innerHTML = html;
        }

        async function loadTestimonials() {
            const { data } = await db.from('testimonials').select('*').eq('active', true).order('order_index');
            const html = data.map(test => `
                <div class="list-item">
                    <div class="list-item-content">
                        <h4>${test.author} - ${test.role}</h4>
                        <p>"${test.text}"</p>
                    </div>
                    <div class="list-item-actions">
                        <button class="btn-edit" onclick="editTestimonial(${test.id})">Düzenle</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('testimonialsList').innerHTML = html;
        }

        async function loadExtras() {
            const { data } = await db.from('extra_services').select('*').order('order_index');
            const html = data.map(ext => `
                <div class="list-item">
                    <div class="list-item-content">
                        <h4>${ext.name}</h4>
                        <p>${ext.description}</p>
                    </div>
                </div>
            `).join('');
            document.getElementById('extrasList').innerHTML = html;
        }

        // MODALS
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        function openPackageModal() {
            document.getElementById('packageModal').classList.add('show');
        }

        async function savePackage(e) {
            e.preventDefault();
